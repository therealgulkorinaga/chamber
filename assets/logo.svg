<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="burn" x1="0.7" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16c784" stop-opacity="1"/>
      <stop offset="60%" stop-color="#16c784" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#16c784" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#111118"/>

  <!-- Chamber hexagon — 5 solid sides, 1 dissolving -->
  <g transform="translate(256,256)">
    <!-- Solid sides (5 of 6) -->
    <polyline points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
              fill="none" stroke="#16c784" stroke-width="8" stroke-linejoin="round"
              stroke-dasharray="1200" stroke-dashoffset="0"/>

    <!-- Inner sealed space — subtle fill -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="#16c784" fill-opacity="0.06"/>

    <!-- The dissolving side (top-right) — fragments breaking away -->
    <!-- Fragment 1 -->
    <line x1="104" y1="-60" x2="90" y2="-80" stroke="#16c784" stroke-width="4" opacity="0.7"/>
    <!-- Fragment 2 -->
    <line x1="110" y1="-50" x2="125" y2="-70" stroke="#16c784" stroke-width="3" opacity="0.5"/>
    <!-- Fragment 3 -->
    <line x1="115" y1="-35" x2="135" y2="-45" stroke="#16c784" stroke-width="2.5" opacity="0.35"/>
    <!-- Fragment 4 -->
    <line x1="118" y1="-20" x2="145" y2="-25" stroke="#16c784" stroke-width="2" opacity="0.2"/>
    <!-- Fragment 5 -->
    <circle cx="150" cy="-55" r="2" fill="#16c784" opacity="0.3"/>
    <!-- Fragment 6 -->
    <circle cx="160" cy="-35" r="1.5" fill="#16c784" opacity="0.2"/>
    <!-- Fragment 7 -->
    <circle cx="140" cy="-75" r="1.5" fill="#16c784" opacity="0.15"/>
    <!-- Fragment 8 -->
    <circle cx="170" cy="-50" r="1" fill="#16c784" opacity="0.1"/>

    <!-- Overwrite the dissolving side with fading gradient -->
    <line x1="52" y1="-90" x2="104" y2="-60" stroke="url(#burn)" stroke-width="8" stroke-linecap="round"/>

    <!-- Keyhole / center mark — the world inside -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#16c784" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#16c784" opacity="0.9"/>
  </g>
</svg>
